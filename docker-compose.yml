services:
  babyllm:
    build: .
    container_name: babyllm
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - babyllm_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  babyllm_data:
    driver: local
